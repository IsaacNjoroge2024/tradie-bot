server.port=8080

spring.application.name=api-gateway

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:tradie}
spring.datasource.username=${DB_USER:tradie}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# TradingView webhook authentication
tradie.webhook.secret=${TV_WEBHOOK_SECRET}

# Flyway - schema version management
# baseline-on-migrate allows Flyway to work alongside the Docker init.sql schema.
# Future schema changes go in db/migration as V2__*, V3__*, etc.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.com.tradie=INFO
logging.level.org.springframework.kafka=INFO
