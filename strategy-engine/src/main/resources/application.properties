server.port=8081

spring.application.name=strategy-engine

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tradie}
spring.datasource.username=${DB_USER:tradie}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=strategy-engine
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tradie.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# News Shield service URL
news-shield.url=${NEWS_SHIELD_URL:http://localhost:8001}

# Risk management defaults
risk.max-risk-per-trade-pct=${MAX_RISK_PER_TRADE_PCT:2.0}
risk.max-daily-loss-pct=${MAX_DAILY_LOSS_PCT:3.0}
risk.max-portfolio-heat-pct=${MAX_PORTFOLIO_HEAT_PCT:6.0}
risk.min-risk-reward-ratio=${MIN_RISK_REWARD_RATIO:2.0}
