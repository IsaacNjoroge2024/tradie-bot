name: Python CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Test and Lint Python Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-shield/pyproject.toml

      - name: Install dependencies
        run: |
          cd news-shield
          pip install -e ".[dev]"

      - name: Check formatting with black
        run: |
          cd news-shield
          black --check src/ tests/

      - name: Run tests
        run: |
          cd news-shield
          pytest tests/ -v
