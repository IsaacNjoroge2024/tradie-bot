name: Python CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'news-shield/**'
      - '.github/workflows/python-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'news-shield/**'
      - '.github/workflows/python-ci.yml'

jobs:
  test-and-lint:
    name: Test and Lint Python Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-shield

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-shield/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Run tests
        run: pytest tests/ -v
