server.port=8081

spring.application.name=strategy-engine

# Keep servlet mode when spring-webflux is on the classpath
spring.main.web-application-type=servlet

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:tradie}
spring.datasource.username=${DB_USER:tradie}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka - consumer/producer details are configured in KafkaConfig.java
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Cache (Caffeine) - used to cache News Shield responses
spring.cache.type=caffeine
spring.cache.cache-names=marketStatus
spring.cache.caffeine.spec=expireAfterWrite=60s,maximumSize=500

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Strategy Engine configuration
tradie.strategy.kill-zone-strict-mode=false
tradie.strategy.signal-expiry-seconds=300
tradie.strategy.max-concurrent-positions=5

# Risk management
tradie.risk.max-risk-per-trade-pct=2.0
tradie.risk.max-daily-loss-pct=3.0
tradie.risk.max-portfolio-heat-pct=6.0
tradie.risk.min-risk-reward-ratio=2.0
tradie.risk.losing-streak-threshold=3
tradie.risk.losing-streak-size-reduction=0.5
tradie.risk.default-account-balance=10000.0

# News Shield
tradie.news-shield.base-url=${NEWS_SHIELD_URL:http://localhost:8001}
tradie.news-shield.timeout-ms=5000

# Logging
logging.level.com.tradie=INFO
logging.level.org.springframework.kafka=INFO
